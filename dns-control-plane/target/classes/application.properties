# -------------------------------------------------------
# DNS Control Plane - Pure Socket Server Configuration
# -------------------------------------------------------

# DNS listener ports
dns.udp.port=5354
dns.tcp.port=5354

# Cache server IPs (l1/l2) — read from lServers.txt
dns.zone.file=../lServers.txt

# Current cluster state — written by data plane, contains leaderIp
dns.leader.file=../states.txt

# Fallback: plain list of node IPs, one per line
dns.nodes.file=../nodes.txt

# Cache ports
dns.cache.l1.port=8100
dns.cache.l2.port=8200

# Data plane read port
dns.dataplane.port=8000

# Rate limiting
dns.ratelimit.max-queries=100
dns.ratelimit.window-seconds=10

# ACL
dns.acl.subnet-prefix=192.168
dns.acl.octet3-min=10
dns.acl.octet3-max=13

# Thread pools
dns.threads.udp=4
dns.threads.tcp=8